<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>encrypted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cy:#3fd7ff;--cyD:#1d8ab5;--ink:#050d14;--pane:rgba(7,17,26,.78);--txt:#d9f2fb;--dim:rgba(217,242,251,.55)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--ink);color:var(--txt);font-family:ui-monospace,Menlo,Consolas,monospace;-webkit-font-smoothing:antialiased;overflow:hidden}
  canvas#rain{position:fixed;inset:0;z-index:0}
  .gate{position:relative;z-index:1;min-height:100%;display:flex;align-items:center;justify-content:center;padding:26px;transition:opacity .5s}
  .gate.gone{opacity:0;pointer-events:none}
  .panel{width:min(88vw,360px);background:var(--pane);border:1px solid rgba(63,215,255,.35);border-radius:18px;
    padding:30px 26px;text-align:center;backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(63,215,255,.18),0 24px 60px rgba(0,0,0,.6)}
  .lock{width:70px;height:70px;margin:0 auto 18px;filter:drop-shadow(0 0 12px rgba(63,215,255,.6))}
  .tag{font-size:.68rem;letter-spacing:.4em;color:var(--cy);margin-bottom:10px}
  h1{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:1.9rem;color:#fff;margin-bottom:10px;letter-spacing:.01em}
  .sub{font-family:'Figtree',sans-serif;color:var(--dim);font-size:.92rem;line-height:1.55;margin-bottom:24px}
  input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid rgba(63,215,255,.4);
    background:rgba(63,215,255,.06);color:var(--txt);font-family:ui-monospace,Menlo,monospace;font-size:1.05rem;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(63,215,255,.15)}
  input::placeholder{color:rgba(217,242,251,.3)}
  button{margin-top:12px;width:100%;border:none;border-radius:12px;padding:14px 0;
    background:linear-gradient(135deg,#5ee1ff,#1d9ed4);color:#03222f;font-family:ui-monospace,Menlo,monospace;font-size:1rem;font-weight:700;letter-spacing:.08em;cursor:pointer;
    box-shadow:0 8px 26px rgba(63,215,255,.35);transition:transform .15s}
  button:active{transform:scale(.97)}
  .err{margin-top:12px;color:#ff8f8f;font-size:.82rem;letter-spacing:.12em;min-height:1.3em;opacity:0;transition:opacity .25s}
  .err.show{opacity:1}
  .hintline{margin-top:18px;font-family:'Figtree',sans-serif;font-style:italic;color:var(--dim);font-size:.86rem;line-height:1.5}
  .hintline b{color:var(--cy);font-style:normal;font-weight:600}
  .shake{animation:shk .45s}
  @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(5px)}}
  .busy{opacity:.6;pointer-events:none}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#150d1e;z-index:2}
  .nocrypto{display:none;margin-top:14px;color:#ff8f8f;font-size:.82rem;font-family:'Figtree',sans-serif}
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="gate" id="gate">
  <div class="panel" id="box">
    <svg class="lock" viewBox="0 0 64 64" fill="none">
      <path d="M32 3 L56 11 V30 C56 45 46 56 32 61 C18 56 8 45 8 30 V11 Z" stroke="#3fd7ff" stroke-width="2.6" fill="rgba(63,215,255,.07)"/>
      <rect x="22" y="27" width="20" height="16" rx="3" stroke="#3fd7ff" stroke-width="2.4" fill="rgba(63,215,255,.12)"/>
      <path d="M25 27 V22 a7 7 0 0 1 14 0 V27" stroke="#3fd7ff" stroke-width="2.4"/>
      <circle cx="32" cy="34" r="2.4" fill="#3fd7ff"/>
      <path d="M32 36 V39.5" stroke="#3fd7ff" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    <div class="tag">ENCRYPTED</div>
    <h1>a sealed message</h1>
    <div class="sub">restricted access. enter the password<br>to decrypt the contents.</div>
    <input id="pw" type="text" autocomplete="off" autocapitalize="none" placeholder="enter password" enterkeyhint="go">
    <button id="go">DECRYPT</button>
    <div class="err" id="err">ACCESS DENIED &mdash; TRY AGAIN</div>
    <div class="nocrypto" id="nocrypto">this browser can&rsquo;t decrypt here &mdash; open the link in Safari or Chrome.</div>
  </div>
</div>
<iframe id="fr" allow="autoplay; fullscreen"></iframe>
<script>
  /* binary rain */
  (function(){
    var c=document.getElementById('rain'),x=c.getContext('2d'),W,H,cols,drops,FS=15,last=0;
    var rm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
    function size(){W=c.width=innerWidth;H=c.height=innerHeight;cols=Math.ceil(W/FS);drops=[];for(var i=0;i<cols;i++)drops.push(Math.random()*-H/FS);}
    size();addEventListener('resize',size);
    x.fillStyle='#050d14';x.fillRect(0,0,W,H);
    function tick(t){
      if(t-last>50){
        last=t;
        x.fillStyle='rgba(5,13,20,.12)';x.fillRect(0,0,W,H);
        x.font=FS+'px Menlo,monospace';
        for(var i=0;i<cols;i++){
          var ch=Math.random()<.5?'0':'1';
          var y=drops[i]*FS;
          x.fillStyle='rgba(63,215,255,'+(Math.random()<.08?'.9':'.32')+')';
          x.fillText(ch,i*FS,y);
          if(y>H&&Math.random()>.975)drops[i]=0;
          drops[i]++;
        }
      }
      if(!rm)requestAnimationFrame(tick);
    }
    if(rm){ // static field
      x.font=FS+'px Menlo,monospace';
      for(var i=0;i<cols;i++)for(var j=0;j<H/FS;j++){if(Math.random()<.14){x.fillStyle='rgba(63,215,255,.25)';x.fillText(Math.random()<.5?'0':'1',i*FS,j*FS);}}
    } else requestAnimationFrame(tick);
  })();

  var SALT='iYylW8jHTtaZTJkz8aVW3w==',IV='A6VXNOTYlLtU7Hwm';
  var payloadP=fetch('p.bin').then(function(r){if(!r.ok)throw 0;return r.arrayBuffer();}).catch(function(){return null;});
  function b64d(s){var b=atob(s),n=b.length,u=new Uint8Array(n);for(var i=0;i<n;i++)u[i]=b.charCodeAt(i);return u;}
  var gate=document.getElementById('gate'),box=document.getElementById('box'),
      pwEl=document.getElementById('pw'),go=document.getElementById('go'),err=document.getElementById('err'),
      fr=document.getElementById('fr');
  var okEnv=window.crypto&&crypto.subtle&&typeof DecompressionStream!=='undefined';
  if(!okEnv){document.getElementById('nocrypto').style.display='block';}
  async function gunzip(u8){
    var ds=new DecompressionStream('gzip');
    var stream=new Blob([u8]).stream().pipeThrough(ds);
    var buf=await new Response(stream).arrayBuffer();
    return new Uint8Array(buf);
  }
  async function unlock(){
    var pw=(pwEl.value||'').trim().toLowerCase();
    if(!pw||!okEnv){wrong();return;}
    box.classList.add('busy');err.classList.remove('show');go.textContent='DECRYPTING\u2026';
    try{
      var enc=new TextEncoder();
      var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits']);
      var bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:b64d(SALT),iterations:150000,hash:'SHA-256'},km,256);
      var key=await crypto.subtle.importKey('raw',bits,'AES-GCM',false,['decrypt']);
      var buf=await payloadP;
      if(!buf){go.textContent='DECRYPT';box.classList.remove('busy');err.textContent='COULDN\u2019T LOAD \u2014 CHECK CONNECTION';err.classList.add('show');return;}
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,buf);
      var raw=await gunzip(new Uint8Array(pt));
      var html=new TextDecoder().decode(raw);
      fr.style.display='block';
      fr.addEventListener('load',function h(){fr.removeEventListener('load',h);
        try{fr.contentWindow.postMessage({k:Array.prototype.slice.call(new Uint8Array(bits))},'*');}catch(e){}
      });
      fr.srcdoc=html;
      setTimeout(function(){gate.classList.add('gone');setTimeout(function(){gate.style.display='none';},550);},350);
    }catch(e){
      go.textContent='DECRYPT';box.classList.remove('busy');wrong();
    }
  }
  function wrong(){
    go.textContent='DECRYPT';box.classList.remove('busy');
    err.classList.add('show');
    box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
  }
  go.addEventListener('click',unlock);
  pwEl.addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
</script>
</body>
</html>
